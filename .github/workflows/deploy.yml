name: Deploy site to GitHub Pages

# Publishes projects/site/ to GitHub Pages on every push to main.
# Push to main -> site rebuilds -> live in about a minute.

on:
  push:
    branches: [main]
    paths:
      - "projects/site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
