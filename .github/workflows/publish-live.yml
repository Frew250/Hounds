name: Publish site to live branch

# When the site changes on main, copy projects/site/ to the root of the
# `live` branch. Hostinger auto-deploys `live`, so this makes every push
# to main go live automatically — with only the site files published
# (no AGENTS.md, docs, or .claude tooling exposed).

on:
  push:
    branches: [main]
    paths:
      - "projects/site/**"
      - ".github/workflows/publish-live.yml"
  workflow_dispatch: # allows a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: publish-live
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish projects/site to the live branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./projects/site
          publish_branch: live
          force_orphan: true
          commit_message: "Deploy site from ${{ github.sha }}"
